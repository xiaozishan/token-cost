<!DOCTYPE html>
<html lang="zh-CN" data-theme="auto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Token Cost</title>
<style>
:root {
  --bg: #f4f5f7;
  --card-bg: #fff;
  --text: #1a1a2e;
  --text-secondary: #6b7280;
  --text-tertiary: #9ca3af;
  --border: #e5e7eb;
  --accent: #4f46e5;
  --accent-dim: #e0e7ff;
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
  --shadow-lg: 0 4px 6px -1px rgba(0,0,0,.07), 0 2px 4px -2px rgba(0,0,0,.05);
  --radius: 14px;
  --radius-sm: 10px;
  --deepseek: #4f6ef7;
  --deepseek-bg: #eef2ff;
  --volcano: #f04e30;
  --volcano-bg: #fef2f2;
  --kimi: #10b981;
  --kimi-bg: #ecfdf5;
  --skeleton: #e5e7eb;
  --skeleton-shine: #f3f4f6;
  --error-bg: #fef2f2;
  --error-text: #dc2626;
}

/* system dark */
@media (prefers-color-scheme: dark) {
  [data-theme="auto"] {
    --bg: #0f1117;
    --card-bg: #1a1d27;
    --text: #e5e7eb;
    --text-secondary: #9ca3af;
    --text-tertiary: #6b7280;
    --border: #2d3040;
    --shadow: 0 1px 3px rgba(0,0,0,.3);
    --shadow-lg: 0 4px 8px rgba(0,0,0,.35);
    --deepseek-bg: rgba(79,110,247,.14);
    --volcano-bg: rgba(240,78,48,.14);
    --kimi-bg: rgba(16,185,129,.14);
    --skeleton: #2d3040;
    --skeleton-shine: #363a4d;
    --error-bg: rgba(220,38,38,.12);
    --accent-dim: rgba(79,70,229,.2);
  }
}

/* manual dark */
[data-theme="dark"] {
  --bg: #0f1117;
  --card-bg: #1a1d27;
  --text: #e5e7eb;
  --text-secondary: #9ca3af;
  --text-tertiary: #6b7280;
  --border: #2d3040;
  --shadow: 0 1px 3px rgba(0,0,0,.3);
  --shadow-lg: 0 4px 8px rgba(0,0,0,.35);
  --deepseek-bg: rgba(79,110,247,.14);
  --volcano-bg: rgba(240,78,48,.14);
  --kimi-bg: rgba(16,185,129,.14);
  --skeleton: #2d3040;
  --skeleton-shine: #363a4d;
  --error-bg: rgba(220,38,38,.12);
  --accent-dim: rgba(79,70,229,.2);
}

/* manual light — keep defaults, no override needed */
[data-theme="light"] { }

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

.container {
  max-width: 1000px;
  margin: 0 auto;
  padding: 28px 16px 56px;
}

/* ─── Header ─── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 24px;
}

.header-left { display: flex; align-items: baseline; gap: 10px; }

.header h1 {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -.02em;
}

.header-sub {
  font-size: 13px;
  color: var(--text-tertiary);
}

.header-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

/* ─── Buttons ─── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border: 1px solid var(--border);
  background: var(--card-bg);
  color: var(--text);
  border-radius: 999px;
  font-size: 13px;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
  font-family: inherit;
}
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn:active { transform: scale(.97); }
.btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn.active:hover { opacity: .9; }
.btn:disabled { opacity: .5; pointer-events: none; }

.theme-btn { padding: 8px 10px; }

.refresh-btn.spin .icon-refresh { animation: spin .6s linear; }

.countdown {
  font-size: 12px;
  color: var(--text-tertiary);
  font-variant-numeric: tabular-nums;
  min-width: 50px;
  text-align: center;
}

@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

/* ─── Summary bar ─── */
.summary {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 20px;
}

.summary-item {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  box-shadow: var(--shadow);
}
.summary-label {
  font-size: 11px;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: .05em;
  margin-bottom: 4px;
}
.summary-value {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -.01em;
  font-variant-numeric: tabular-nums;
}

/* ─── Grid ─── */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
@media (max-width: 700px) {
  .grid { grid-template-columns: 1fr; }
  .header { flex-direction: column; align-items: flex-start; }
  .header-right { width: 100%; justify-content: space-between; }
  .header h1 { font-size: 22px; }
}

/* ─── Card ─── */
.card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 22px 20px 18px;
  box-shadow: var(--shadow);
  transition: box-shadow .2s, transform .2s, border-color .2s;
  animation: fadeIn .35s ease;
  position: relative;
  overflow: hidden;
}
.card:hover { box-shadow: var(--shadow-lg); }
.card.loading { pointer-events: none; }

.card::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  border-radius: var(--radius) var(--radius) 0 0;
  opacity: .85;
}
.card.ds::before { background: var(--deepseek); }
.card.vol::before { background: var(--volcano); }
.card.ki::before { background: var(--kimi); }

.card-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 18px;
}

.platform-logo {
  width: 40px; height: 40px;
  border-radius: var(--radius-sm);
  object-fit: contain;
  flex-shrink: 0;
  background: var(--card-bg);
}

.platform-name {
  font-size: 15px; font-weight: 600;
  letter-spacing: -.01em;
}

/* ─── Status badges ─── */
.status-dot {
  display: inline-block;
  width: 7px; height: 7px;
  border-radius: 50%;
  margin-right: 4px;
  flex-shrink: 0;
}
.status-dot.ok { background: #10b981; }
.status-dot.err { background: #ef4444; }
.status-dot.warn { background: #f59e0b; }

/* ─── Balance ─── */
.balance-section { margin-bottom: 14px; }
.balance-label {
  font-size: 12px; color: var(--text-tertiary);
  text-transform: uppercase; letter-spacing: .06em;
  margin-bottom: 4px;
}
.balance-value {
  font-size: 32px; font-weight: 700;
  letter-spacing: -.02em; font-variant-numeric: tabular-nums;
  line-height: 1.1;
}
.balance-unit { font-size: 14px; font-weight: 500; color: var(--text-secondary); margin-left: 4px; }

/* ─── Volcano extra ─── */
.vol-status-row {
  display: flex; gap: 16px; align-items: center;
  font-size: 12px; margin-bottom: 4px;
  flex-wrap: wrap;
}
.vol-models {
  font-size: 12px; color: var(--text-secondary);
  margin-top: 6px;
}
.vol-hint {
  margin-top: 10px; padding-top: 10px;
  border-top: 1px solid var(--border);
  font-size: 11px; color: var(--text-tertiary);
  line-height: 1.6;
}
.vol-hint a { color: var(--accent); text-decoration: none; }
.vol-hint a:hover { text-decoration: underline; }

/* ─── Skeleton ─── */
.skeleton {
  background: var(--skeleton);
  border-radius: 6px;
  position: relative; overflow: hidden;
}
.skeleton::after {
  content: ""; position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, var(--skeleton-shine), transparent);
  animation: shimmer 1.6s ease-in-out infinite;
}
@keyframes shimmer { 0% { transform: translateX(-100%) } 100% { transform: translateX(100%) } }

.skel-lg { height: 36px; width: 70%; margin: 4px 0 8px; }
.skel-sm { height: 15px; width: 48%; }

/* ─── Error ─── */
.card-error {
  background: var(--error-bg);
  border: 1px solid rgba(220,38,38,.25);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  color: var(--error-text);
  font-size: 13px;
  margin: 8px 0;
}
.card-error .err-title { font-weight: 600; margin-bottom: 4px; }
.card-error .err-detail { opacity: .8; font-size: 12px; word-break: break-all; }

/* ─── Footer ─── */
.setup-hint {
  margin-top: 32px; text-align: center;
  font-size: 13px; color: var(--text-tertiary);
  line-height: 1.8;
}
.setup-hint code {
  background: var(--card-bg); border: 1px solid var(--border);
  padding: 2px 8px; border-radius: 4px; font-size: 12px;
}
</style>
</head>
<body>
<div class="container">

  <header class="header">
    <div class="header-left">
      <h1>Token Cost</h1>
      <span class="header-sub">API 余额监控</span>
    </div>
    <div class="header-right">
      <span class="countdown" id="countdown"></span>
      <button class="btn theme-btn" id="themeBtn" onclick="cycleTheme()" title="切换主题">
        <svg id="themeIcon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
      <button class="btn" id="autoBtn" onclick="toggleAuto()" title="自动刷新">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        自动
      </button>
      <button class="btn refresh-btn" id="refreshBtn" onclick="fetchAll()">
        <svg class="icon-refresh" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        刷新
      </button>
    </div>
  </header>

  <div class="summary" id="summary">
    <div class="summary-item">
      <div class="summary-label">总余额</div>
      <div class="summary-value" id="sumBalance">—</div>
    </div>
    <div class="summary-item">
      <div class="summary-label">最后更新</div>
      <div class="summary-value" id="sumTime" style="font-size:15px;">—</div>
    </div>
  </div>

  <div class="grid">
    <div class="card ds loading" id="card-ds">
      <div class="card-header">
        <img class="platform-logo" src="https://logo-teka.com/wp-content/uploads/2025/07/deepseek-sign-logo.svg" alt="DeepSeek">
        <span class="platform-name">DeepSeek</span>
      </div>
      <div id="ds-content"><div class="skeleton skel-lg"></div><div class="skeleton skel-sm"></div></div>
    </div>

    <div class="card vol loading" id="card-vol">
      <div class="card-header">
        <img class="platform-logo" src="https://unpkg.com/@lobehub/icons-static-svg@latest/icons/volcengine-color.svg" alt="火山引擎">
        <span class="platform-name">火山引擎</span>
      </div>
      <div id="vol-content"><div class="skeleton skel-lg"></div><div class="skeleton skel-sm"></div></div>
    </div>

    <div class="card ki loading" id="card-ki">
      <div class="card-header">
        <img class="platform-logo" src="https://www.kimi.com/favicon.ico" alt="Kimi">
        <span class="platform-name">Kimi</span>
      </div>
      <div id="ki-content"><div class="skeleton skel-lg"></div><div class="skeleton skel-sm"></div></div>
    </div>
  </div>
    </div>
  </div>

  <p class="setup-hint">
    配置方式：将 <code>.env.example</code> 复制为 <code>.env</code> 并填入各平台 Key，执行 <code>npm start</code>
  </p>

</div>

<script>
// ─── Config ───
const AUTO_INTERVAL = 60;
let autoTimer = null;
let autoCountdown = 0;
let countdownTimer = null;
let platformData = {};

// ─── Theme ───
const THEMES = ["auto", "light", "dark"];
function getTheme() { return document.documentElement.getAttribute("data-theme") || "auto"; }
function setTheme(t) {
  document.documentElement.setAttribute("data-theme", t);
  localStorage.setItem("theme", t);
}

function cycleTheme() {
  const idx = THEMES.indexOf(getTheme());
  const next = THEMES[(idx + 1) % THEMES.length];
  setTheme(next);
}

// init theme from localStorage
(function() {
  const saved = localStorage.getItem("theme");
  if (saved && THEMES.includes(saved)) setTheme(saved);
})();

// ─── Helpers ───
function fmt(n) {
  if (n == null || n === "" || isNaN(n)) return "—";
  if (Math.abs(n) < 0.01 && n !== 0) return n.toFixed(6);
  if (Math.abs(n) >= 1e6) return (n / 1e6).toFixed(2) + "M";
  if (Math.abs(n) >= 1e4) return (n / 1000).toFixed(1) + "K";
  return n.toFixed(2);
}

function skel(id) {
  document.getElementById(id).innerHTML =
    '<div class="skeleton skel-lg"></div><div class="skeleton skel-sm"></div>';
}

function timeStr() {
  return new Date().toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
}

// ─── Update summary bar ───
function updateSummary() {
  let totalBalance = 0, hasData = false;
  for (const key of Object.keys(platformData)) {
    const d = platformData[key];
    if (d && d.ok && d.balance != null) {
      totalBalance += d.balance;
      hasData = true;
    }
  }
  document.getElementById("sumBalance").textContent = hasData ? "¥" + fmt(totalBalance) : "—";
  document.getElementById("sumTime").textContent = timeStr();
}

// ─── Render platform card ───
function renderPlatform(id, data, platform) {
  const el = document.getElementById(id);
  const card = el.parentElement;
  card.classList.remove("loading");

  if (!data || !data.ok) {
    el.innerHTML = `<div class="card-error"><div class="err-title">无法获取数据</div><div class="err-detail">${(data && data.error) || "未知错误"}</div></div>`;
    return;
  }

  if (platform === "volcano") {
    const balance = data.balance;
    const unit = (data.currency || "").replace("CNY", "¥").replace("USD", "$");

    el.innerHTML = `
      <div class="balance-section">
        <div class="balance-label">账户余额 (${unit})</div>
        <div class="balance-value">${balance != null ? fmt(balance) : "—"}</div>
      </div>
    `;
    return;
  }

  const balance = data.balance;
  const unit = (data.currency || "").replace("CNY", "¥").replace("USD", "$");

  el.innerHTML = `
    <div class="balance-section">
      <div class="balance-label">账户余额 (${unit})</div>
      <div class="balance-value">${balance != null ? fmt(balance) : "—"}</div>
    </div>
  `;
}

// ─── Fetch single platform ───
async function fetchPlatform(platform, contentId) {
  try {
    const r = await fetch(`/api/${platform}`);
    const data = await r.json();
    platformData[platform] = data;
    renderPlatform(contentId, data, platform);
  } catch (e) {
    platformData[platform] = { ok: false, error: e.message };
    renderPlatform(contentId, { ok: false, error: e.message }, platform);
  }
}

// ─── Fetch all platforms ───
async function fetchAll() {
  const btn = document.getElementById("refreshBtn");
  btn.classList.add("spin");
  btn.disabled = true;

  ["ds-content", "vol-content", "ki-content"].forEach(skel);
  ["card-ds", "card-vol", "card-ki"].forEach(id => document.getElementById(id).classList.add("loading"));

  await Promise.all([
    fetchPlatform("deepseek", "ds-content"),
    fetchPlatform("volcano", "vol-content"),
    fetchPlatform("kimi", "ki-content"),
  ]);

  updateSummary();

  setTimeout(() => { btn.classList.remove("spin"); btn.disabled = false; }, 600);
}

// ─── Auto-refresh ───
function updateCountdownDisplay() {
  const el = document.getElementById("countdown");
  const m = Math.floor(autoCountdown / 60);
  const s = autoCountdown % 60;
  el.textContent = `${m}:${String(s).padStart(2, "0")}`;
}

function startCountdown() {
  autoCountdown = AUTO_INTERVAL;
  updateCountdownDisplay();
  countdownTimer = setInterval(() => {
    autoCountdown--;
    updateCountdownDisplay();
    if (autoCountdown <= 0) {
      fetchAll().then(() => { autoCountdown = AUTO_INTERVAL; updateCountdownDisplay(); });
    }
  }, 1000);
}

function stopCountdown() {
  if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
}

function toggleAuto() {
  const btn = document.getElementById("autoBtn");
  if (autoTimer) {
    btn.classList.remove("active");
    stopCountdown();
    autoTimer = null;
    document.getElementById("countdown").textContent = "";
  } else {
    btn.classList.add("active");
    autoCountdown = AUTO_INTERVAL;
    updateCountdownDisplay();
    startCountdown();
  }
}

// ─── Init ───
fetchAll();
</script>
</body>
</html>
