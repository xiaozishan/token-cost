apply plugin: 'com.android.application'

android {
    namespace 'com.tokencost.app'
    compileSdk 36

    defaultConfig {
        applicationId 'com.tokencost.app'
        minSdk 24
        targetSdk 36
        versionCode 1
        versionName '3.0.0'
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
